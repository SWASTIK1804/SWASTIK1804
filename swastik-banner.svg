<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 620" width="1280" height="620" role="img" aria-label="Swastik - Full Stack Developer">
<title>Swastik — Full Stack Developer | CS Student</title>
<defs>
<style type="text/css"><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:translateY(14px) scale(.7)}70%{opacity:1;transform:translateY(-3px) scale(1.06)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinRev{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1)}}
@keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.5}88%{opacity:.5}100%{transform:translateY(-46px);opacity:0}}
.pop{opacity:0;animation:popIn .5s cubic-bezier(.2,.8,.3,1.3) forwards}
.fade{opacity:0}
.pill{transition:transform .2s ease;transform-box:fill-box;transform-origin:center}
.cur{animation:blink 1s step-end infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.6s ease-in-out infinite}
.fl{transform-box:fill-box;transform-origin:center;animation:floaty 5s ease-in-out infinite}
.spin{transform-box:fill-box;transform-origin:center;animation:spin 18s linear infinite}
.spinR{transform-box:fill-box;transform-origin:center;animation:spinRev 24s linear infinite}
.rp{animation:rise linear infinite}
.sep{stroke:#1e2a44;stroke-width:1;opacity:.7}
]]></style>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#0b1120"/><stop offset="55%" stop-color="#0e1526"/><stop offset="100%" stop-color="#080c17"/>
</linearGradient>
<linearGradient id="nameg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#7C3AED"><animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="7s" repeatCount="indefinite"/></stop>
  <stop offset="100%" stop-color="#22D3EE"><animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="7s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="borderg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#7C3AED" stop-opacity=".4"/><stop offset="50%" stop-color="#22D3EE" stop-opacity=".3"/><stop offset="100%" stop-color="#10B981" stop-opacity=".4"/>
</linearGradient>
<radialGradient id="orbV"><stop offset="0%" stop-color="#7C3AED" stop-opacity=".18"/><stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/></radialGradient>
<radialGradient id="orbC"><stop offset="0%" stop-color="#22D3EE" stop-opacity=".16"/><stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
<radialGradient id="orbE"><stop offset="0%" stop-color="#10B981" stop-opacity=".12"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></radialGradient>
<filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glowBig"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="15" cy="15" r=".6" fill="rgba(34,211,238,.08)"/></pattern>

<clipPath id="cPrompt"><rect x="48" y="48" width="0" height="32"><animate attributeName="width" from="0" to="470" dur="1s" begin=".3s" fill="freeze"/></rect></clipPath>
