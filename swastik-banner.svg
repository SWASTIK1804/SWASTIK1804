<clipPath id="r2"><rect x="48" y="176" width="0" height="34"><animate attributeName="width" values="0;0;230;230;0;0" keyTimes="0;.26;.32;.45;.49;1" dur="20s" repeatCount="indefinite" begin="2.4s"/></rect></clipPath>
<clipPath id="r3"><rect x="48" y="176" width="0" height="34"><animate attributeName="width" values="0;0;260;260;0;0" keyTimes="0;.51;.57;.7;.74;1" dur="20s" repeatCount="indefinite" begin="2.4s"/></rect></clipPath>
<clipPath id="r4"><rect x="48" y="176" width="0" height="34"><animate attributeName="width" values="0;0;250;250;0;0" keyTimes="0;.76;.82;.95;.99;1" dur="20s" repeatCount="indefinite" begin="2.4s"/></rect></clipPath>
